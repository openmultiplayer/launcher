; ============================================================================
;  TrackpadFixSA - GTA San Andreas trackpad / mouse input fix for Wine/CrossOver
;  Place next to gta_sa.exe. Every key optional; omit for Wine-aware defaults.
; ============================================================================
[TrackpadFix]

; --- master ---------------------------------------------------------------
Enabled              = 1      ; 0 = no hooks at all (pure pass-through)

; --- delta sanitisation ---------------------------------------------------
ClampMax             = 220    ; hard cap on |delta| per axis (raw counts)
Deadzone             = 0      ; |delta| below this -> 0 (try 2-3 if it drifts)
StuckFrames          = 6      ; identical non-zero delta N frames -> 0.
                              ; THE infinite-spin fix. Lower = stricter.
Sensitivity          = 1.0    ; post-filter multiplier

; --- trackpad smoothing ---------------------------------------------------
TrackpadMode         = 1      ; 1 = EMA low-pass smoothing
Smoothing            = 0.35   ; 0..0.95 (Wine default auto-raised to 0.45)

; --- frame-rate independence ----------------------------------------------
FpsAwareScaling      = 0      ; 1 = renormalise per-frame gain to FpsTarget
FpsTarget            = 60

; --- controller-style camera (optional) ----------------------------------
ControllerEmulation  = 0      ; 1 = decaying-velocity analogue-stick feel
EmulationDecay       = 0.82

; --- robustness -----------------------------------------------------------
FlushOnAcquire       = 1      ; drop stale delta after (re)Acquire
FlushFrames          = 3

; --- environment ----------------------------------------------------------
AutoDetectWine       = 1      ; auto-tune defaults under Wine/CrossOver

; --- diagnostics ----------------------------------------------------------
Logging              = 1      ; TrackpadFixSA.log next to the DLL
DebugDeltas          = 0      ; log every sanitised frame (noisy; tuning only)
