; ============================================================================
;  TrackpadFixSA - GTA San Andreas trackpad / mouse input fix for Wine & CrossOver
;  Place this file next to TrackpadFixSA.asi in the GTA SA folder.
;  Every key is optional; omit a key to use its (Wine-aware) default.
; ============================================================================
[TrackpadFix]

; --- master ---------------------------------------------------------------
Enabled              = 1      ; 0 = plugin completely inert

; --- delta sanitisation ---------------------------------------------------
ClampMax             = 220    ; hard cap on |delta| per axis, raw mouse counts.
                              ; lower if fast flicks still over-rotate.
Deadzone             = 0      ; |delta| below this is dropped. Try 2-3 if a
                              ; resting trackpad still drifts the camera.
StuckFrames          = 6      ; identical non-zero delta for N frames is treated
                              ; as a latched/desynced value -> zeroed.
                              ; THIS is the infinite-spin fix. Lower = stricter.
Sensitivity          = 1.0    ; post-filter multiplier (0.05 .. n).

; --- trackpad smoothing ---------------------------------------------------
TrackpadMode         = 1      ; 1 = EMA low-pass smoothing (kills jitter).
Smoothing            = 0.35   ; 0 .. 0.95. Higher = smoother but more lag.
                              ; Wine default is auto-raised to 0.45.

; --- frame-rate independence ----------------------------------------------
FpsAwareScaling      = 0      ; 1 = renormalise per-frame mouse gain to FpsTarget
                              ; so sensitivity stops changing with FPS.
                              ; Leave 0 if SilentPatch already caps your FPS.
FpsTarget            = 60     ; reference frame rate for the scaling above.

; --- controller-style camera (optional) ----------------------------------
ControllerEmulation  = 0      ; 1 = integrate delta into a decaying velocity,
                              ; giving an analogue-stick camera feel.
EmulationDecay       = 0.82   ; velocity retained per frame in emu mode.

; --- robustness toggles ---------------------------------------------------
FlushOnAcquire       = 1      ; discard stale delta for FlushFrames after the
                              ; device is (re)acquired -> fixes pause/unpause
                              ; and alt-tab camera flips.
FlushFrames          = 3

; --- environment ----------------------------------------------------------
AutoDetectWine       = 1      ; auto-tune defaults when running under Wine/CrossOver.

; --- diagnostics ----------------------------------------------------------
Logging              = 1      ; write TrackpadFixSA.log next to the .asi.
DebugDeltas          = 0      ; log every sanitised frame (very noisy; use only
                              ; while tuning ClampMax / StuckFrames).
